<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="さくら通り整形外科クリニック ロゴ">
  <!-- canopy -->
  <circle cx="50" cy="43" r="39" fill="#F7D2D9"/>
  <!-- trunk (splayed hand) -->
  <path d="M44,97 L42,66 L40,54 L46,60 L50,52 L53,58 L57,53 L58,66 L56,97 Z" fill="#AE876F"/>
  <!-- footprint: heel + 5 toes -->
  <g fill="#E894A6">
    <path d="M49,42 C45,40 45,33.5 49,32.5 C53,33.5 53,40 49,42 Z"/>
    <circle cx="43.6" cy="30.6" r="1.5"/>
    <circle cx="45.7" cy="28.4" r="1.6"/>
    <circle cx="48.2" cy="27.2" r="1.7"/>
    <circle cx="50.8" cy="27.2" r="1.7"/>
    <circle cx="53.2" cy="28.5" r="1.6"/>
  </g>
  <!-- two leaf notches -->
  <g fill="#EC9DAE">
    <path d="M33,44 C29.5,45.5 29,50.5 32,53.5 L33,50.8 L34,53.5 C37,50.5 36.5,45.5 33,44 Z"/>
    <path d="M70,44 C66.5,45.5 66,50.5 69,53.5 L70,50.8 L71,53.5 C74,50.5 73.5,45.5 70,44 Z"/>
  </g>
</svg>
